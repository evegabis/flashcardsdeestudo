```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Flashcards</title>

  <style>

    :root {
      --text-color: #DBE4EF;
      --card-front-color: #144480;
      --card-back-color: #00F4BF;
    }

    body {
      background: url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200");
      background-size: cover;
      background-position: center;
      font-family: Arial, Helvetica, sans-serif;

      margin: 0;
      padding: 0;
    }

    #container {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;

      padding: 4rem;
      gap: 3rem;
    }

    .cartao {
      margin: 1rem;
      height: 20rem;
      flex-grow: 1;
      flex-basis: calc(33% - 6rem);
    }

    .cartao__conteudo {
      background-color: var(--card-front-color);

      text-align: center;

      height: 100%;

      transform-style: preserve-3d;

      transition: transform 300ms ease-in-out;

      border-radius: 2rem;
    }

    .cartao__conteudo h3 {
      color: var(--text-color);

      border: 1px solid var(--text-color);

      text-align: left;

      padding: 0.5rem;

      position: absolute;
      margin: 0.6rem;

      border-radius: 0.6rem;

      font-size: 1vw;

      backface-visibility: hidden;
    }

    .cartao__conteudo p {
      margin-top: 4rem;

      padding: 2rem;

      font-size: 1.4vw;
    }

    .cartao__conteudo__pergunta p {
      color: var(--text-color);
      font-weight: 500;
    }

    .cartao__conteudo__resposta p {
      color: var(--card-front-color);
      font-weight: 700;
    }

    .cartao:hover .cartao__conteudo {
      transform: rotateY(180deg);
    }

    .cartao__conteudo__pergunta,
    .cartao__conteudo__resposta {
      backface-visibility: hidden;

      position: absolute;

      height: 100%;
      width: 100%;
    }

    .cartao__conteudo__resposta {
      transform: rotateY(180deg);

      background-color: var(--card-back-color);

      border-radius: 2rem;
    }

    @media (max-width: 560px) {

      .cartao {
        flex: 1 0 calc(100% - 1rem);
      }

      .cartao__conteudo h3 {
        font-size: 3vw;
      }

      .cartao__conteudo p {
        font-size: 3.8vw;
      }

    }

  </style>
</head>

<body>

  <main id="container">

    <!-- CARD 1 -->
    <article class="cartao">

      <div class="cartao__conteudo">

        <div class="cartao__conteudo__pergunta">
          <h3>HTML</h3>

          <p>
            O que significa HTML?
          </p>
        </div>

        <div class="cartao__conteudo__resposta">
          <h3>Resposta</h3>

          <p>
            HyperText Markup Language.
          </p>
        </div>

      </div>

    </article>

    <!-- CARD 2 -->
    <article class="cartao">

      <div class="cartao__conteudo">

        <div class="cartao__conteudo__pergunta">
          <h3>CSS</h3>

          <p>
            Para que serve o CSS?
          </p>
        </div>

        <div class="cartao__conteudo__resposta">
          <h3>Resposta</h3>

          <p>
            Serve para estilizar páginas web.
          </p>
        </div>

      </div>

    </article>

    <!-- CARD 3 -->
    <article class="cartao">

      <div class="cartao__conteudo">

        <div class="cartao__conteudo__pergunta">
          <h3>JavaScript</h3>

          <p>
            Qual a função do JavaScript?
          </p>
        </div>

        <div class="cartao__conteudo__resposta">
          <h3>Resposta</h3>

          <p>
            Adicionar interatividade às páginas.
          </p>
        </div>

      </div>

    </article>

  </main>

</body>

</html>
```
