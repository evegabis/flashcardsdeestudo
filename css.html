<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards HTML e CSS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      height: 160px;
      perspective: 1000px;
    }
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      cursor: pointer;
    }
    .card:hover .card-inner,
    .card:focus .card-inner {
      transform: rotateY(180deg);
    }
    .frente, .verso {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
      text-align: center;
      font-size: 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .frente {
      background: #2196F3;
      color: white;
      font-weight: bold;
    }
    .verso {
      background: white;
      color: #2196F3;
      transform: rotateY(180deg);
      border: 2px solid #2196F3;
    }
  </style>
</head>
